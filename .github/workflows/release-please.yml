name: Release Please

# Automatic releases: on every push to main, release-please maintains a release
# PR (changelog + version bump). Merging that PR creates the GitHub release and
# tag, and bumps the version in custom_components/ecoflow_iot/manifest.json so
# HACS picks it up. Uses Conventional Commits to decide the version bump.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
